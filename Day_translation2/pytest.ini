[tool:pytest]
# pytest现代化配置 - 专注于服务层架构测试

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85
    --durations=10
    --ignore=__pycache__
    --ignore=.git

markers =
    unit: 单元测试 - 单个函数/类的测试
    integration: 集成测试 - 多个组件协作测试
    service: 服务层测试 - 业务逻辑服务测试
    config: 配置模块测试 - 配置系统测试
    slow: 耗时测试 - 运行时间超过1秒的测试
    api: API测试 - 需要外部API的测试
    benchmark: 性能基准测试

filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
