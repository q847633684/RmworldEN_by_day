[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --cov=Day_translation2
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80
    --doctest-modules
    --ignore=tests/integration
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: Tests that require external API
